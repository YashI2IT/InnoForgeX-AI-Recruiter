ai_usage_summary: |
  Built entirely with Gemini AI (Antigravity IDE Agent). Generated the heuristic ranking code, logic for honeypot filtering, and behavioral signal modifiers based on the provided dataset and specification.

methodology_summary: |
  A highly optimized rule-based and lexical hybrid ranker. It first filters honeypots and explicitly disqualified candidates (e.g. consultants without product experience, title-chasers). Then, it scores candidates using TF-IDF similarity between their profiles (summary/career history) and the JD, boosted by specific technical keywords (e.g. embeddings, Pinecone). Finally, it multiplies the base score by a behavioral signal factor to prioritize engaged, responsive candidates.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
